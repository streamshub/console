name: Pre-Release

on:
  pull_request:
    paths:
      - '.github/project.yml'

jobs:
  release:
    runs-on: ubuntu-latest
    name: pre release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure upgrade YAMLs changed
        run: |
          CHANGED=$(git diff --name-only \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} \
            | grep -E "systemtests/src/test/resources/upgrade/(YamlUpgrade.yaml|OlmUpgrade.yaml)" || true)

          if [ -z "$CHANGED" ]; then
            echo "❌[ERROR]: Neither YamlUpgrade.yaml nor OlmUpgrade.yaml was modified in this PR, exiting the flow."
            exit 1
          fi

          echo "✔️ Upgrade YAML change detected: $CHANGED"

      - name: Retrieve Project Metadata
        uses: smallrye/project-metadata-action@62527b4a896343d4c0c6b2a61eff07f6b59fcbd8
        id: metadata
        with:
          metadata-file-path: '.github/project.yml'

      - name: Review Milestone
        uses: smallrye/milestone-review-action@1126e9e9db5e39f8e3b6795d2718d73800ac89c5
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          milestone-title: ${{steps.metadata.outputs.current-version}}
