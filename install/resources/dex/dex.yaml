---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dex
rules:
- apiGroups: ["dex.coreos.com"] # API group created by dex
  resources: ["*"]
  verbs: ["*"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["create"] # To manage its own resources, dex must be able to create customresourcedefinitions
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dex
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dex
subjects:
- kind: ServiceAccount
  name: dex               # Service account assigned to the dex pod, created above
  namespace: ${NAMESPACE} # The namespace dex is running in
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dex
  name: dex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dex
  template:
    metadata:
      labels:
        app: dex
    spec:
      serviceAccountName: dex # This is created above
      volumes:
      - name: config
        configMap:
          name: dex
          items:
          - key: config.yaml
            path: config.yaml
      - name: openshift-ca
        configMap:
          name: kube-root-ca.crt
          items:
          - key: ca.crt
            path: openshift.pem
      #- name: tls
      #  secret:
      #    secretName: dex.example.com.tls
      containers:
      - image: ghcr.io/dexidp/dex:v2.32.0
        name: dex
        command: ["/usr/local/bin/dex", "serve", "/etc/dex/cfg/config.yaml"]

        ports:
        - name: http
          containerPort: 5556

        volumeMounts:
        - name: config
          mountPath: /etc/dex/cfg
        - name: openshift-ca
          mountPath: /etc/ssl/openshift.pem
          subPath: openshift.pem
        #- name: tls
        #  mountPath: /etc/dex/tls

        env:
        - name: OPENSHIFT_OAUTH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: console-dex-secrets
              key: DEX_CLIENT_ID
        - name: OPENSHIFT_OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: console-dex-secrets
              key: DEX_CLIENT_SECRET

        readinessProbe:
          httpGet:
            path: /healthz
            port: 5556
            scheme: HTTP
---
kind: ConfigMap
apiVersion: v1
metadata:
  name: dex
data:
  config.yaml: |
    issuer: https://console-dex.${CLUSTER_DOMAIN}
    storage:
      type: kubernetes
      config:
        inCluster: true
    web:
      http: 0.0.0.0:5556
      #tlsCert: /etc/dex/tls/tls.crt
      #tlsKey: /etc/dex/tls/tls.key
    connectors:
    - type: openshift
      id: openshift
      name: OpenShift
      config:
        # OpenShift API
        issuer: https://api.crc.testing:6443
        # Credentials can be string literals or pulled from the environment.
        clientID: $$OPENSHIFT_OAUTH_CLIENT_ID
        clientSecret: $$OPENSHIFT_OAUTH_CLIENT_SECRET
        redirectURI: https://console-dex.${CLUSTER_DOMAIN}/callback
        # OpenShift root CA
        rootCA: /etc/ssl/openshift.pem
        # Communicate to OpenShift without validating SSL certificates
        insecureCA: false
        # Optional list of required groups a user must be a member of
        groups: []
    oauth2:
      skipApprovalScreen: true

    staticClients:
    - id: streamshub-console
      name: 'StreamsHub Console'
      secret: ZXhhbXBsZS1hcHAtc2VjcmV0
      redirectURIs:
      - 'http://127.0.0.1:5555/callback'
      - 'http://localhost:3000/api/auth/callback/oidc'
---
apiVersion: v1
kind: Service
metadata:
  name: dex
spec:
  type: ClusterIP
  ports:
  - name: dex
    port: 5556
    protocol: TCP
    targetPort: 5556
  selector:
    app: dex
---
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: console-dex-ingress
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    route.openshift.io/termination: edge
spec:
  defaultBackend:
    service:
      name: dex
      port:
        number: 5556
  rules:
    - host: console-dex.${CLUSTER_DOMAIN}
      http:
        paths:
          - pathType: ImplementationSpecific
            backend:
              service:
                name: dex
                port:
                  number: 5556
